<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Museum Pomodoro</title>

<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/museum.css">

</head>

<body>

<div id="museum">

    <!-- Wall -->

    <div id="wall">

        <!-- Spotlight -->

        <div id="spotlight"></div>

        <!-- Painting -->

        <div id="frame">

            <img
                id="painting"
                src="paintings/painting01.jpg"

        </div>

        <!-- Plaque -->

        <div id="plaque">

            <div id="title">

                Wheat Field with Cypresses

            </div>

            <div id="artist">

                Vincent van Gogh • 1889

            </div>

        </div>

    </div>

    <!-- Floor -->

    <div id="floor">

        <div id="sunlight"></div>

    </div>

</div>

<!-- Timer -->

<div id="ui">

    <div id="timer">

        25:00

    </div>

    <div id="controls">

        <button id="startButton">

            Start

        </button>

        <button id="pauseButton">

            Pause

        </button>

        <button id="resetButton">

            Reset

        </button>

    </div>

</div>

<script src="js/app.js"></script>

</body>
</html>
